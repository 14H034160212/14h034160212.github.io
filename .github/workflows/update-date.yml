name: Update dateModified

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Replace dateModified
        run: |
          TODAY=$(date +%F)
          sed -i 's/"dateModified": ".*"/"dateModified": "'"$TODAY"'"/' index.html

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update dateModified"

      - name: Push changes
        run: git push
